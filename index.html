<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真剣交際期間チェックリスト</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf7f2;
    --warm-white: #fff9f4;
    --ink: #2a2118;
    --ink-light: #6b5c4e;
    --ink-faint: #b8a898;
    --accent: #c4856a;
    --accent-light: #f0e0d6;
    --accent-hover: #a96a52;
    --checked-bg: #f5ede8;
    --border: #e8ddd5;
    --shadow: rgba(42,33,24,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 0 80px;
  }

  header {
    background: var(--ink);
    color: var(--cream);
    padding: 36px 40px 30px;
    /* position: sticky; */
    /* top: 0; */
    /* z-index: 100; */
    box-shadow: 0 2px 20px var(--shadow);
  }

  header h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 12px;
  }

  .progress-bar-wrap {
    background: rgba(255,255,255,0.15);
    border-radius: 100px;
    height: 6px;
    overflow: hidden;
    width: 100%;
    max-width: 400px;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 0;
  }

  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  @media (max-width: 640px) {
    .sections-grid { grid-template-columns: 1fr; }
    header { padding: 24px 20px 20px; }
    .container { padding: 24px 16px 0; }
  }

  .section {
    background: var(--warm-white);
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 2px 12px var(--shadow);
    transition: box-shadow 0.2s;
    break-inside: avoid;
    page-break-inside: avoid;
  }

  .section:hover {
    box-shadow: 0 4px 24px var(--shadow);
  }

  .section-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
  }

  .section-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .section-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.05rem;
    font-weight: 600;
    flex: 1;
  }

  .section-count {
    font-size: 0.75rem;
    color: var(--ink-faint);
    background: var(--cream);
    border-radius: 100px;
    padding: 2px 10px;
    border: 1px solid var(--border);
  }

  .section-toggle {
    font-size: 0.85rem;
    color: var(--ink-faint);
    transition: transform 0.25s;
  }

  .section-body {
    padding: 12px 16px 16px;
  }

  .item {
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    border: 1px solid transparent;
    transition: border-color 0.2s, background 0.2s;
  }

  .item.checked {
    background: var(--checked-bg);
    border-color: var(--accent-light);
  }

  .item-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
  }

  .item-checkbox {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-radius: 6px;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: white;
  }

  .item.checked .item-checkbox {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .item-checkbox::after {
    content: '';
    width: 5px;
    height: 9px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .item.checked .item-checkbox::after { opacity: 1; }

  .item-text-wrap { flex: 1; }

  .item-label {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.4;
    transition: color 0.2s;
  }

  .item.checked .item-label {
    color: var(--ink-light);
    text-decoration: line-through;
    text-decoration-color: var(--accent);
  }

  .item-sub {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 3px;
    line-height: 1.5;
  }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .btn-memo {
    font-size: 0.72rem;
    color: var(--ink-faint);
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .btn-memo:hover, .btn-memo.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent-light);
  }

  .btn-delete-item {
    font-size: 0.8rem;
    color: var(--ink-faint);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.2s;
    line-height: 1;
  }

  .btn-delete-item:hover {
    background: #fee;
    color: #c55;
  }

  .memo-area {
    display: none;
    padding: 0 12px 10px 42px;
  }

  .memo-area.open { display: block; }

  .memo-area textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    color: var(--ink);
    background: white;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.2s;
  }

  .memo-area textarea:focus {
    border-color: var(--accent);
  }

  .memo-area textarea::placeholder {
    color: var(--ink-faint);
  }

  .add-item-form {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--border);
  }

  .add-item-form input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.83rem;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.2s;
  }

  .add-item-form input:focus {
    border-color: var(--accent);
  }

  .add-item-form input::placeholder {
    color: var(--ink-faint);
  }

  .btn-add-item {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s;
    line-height: 1;
  }

  .btn-add-item:hover { background: var(--accent-hover); }

  .section.full-width {
    grid-column: 1 / -1;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--ink);
    display: flex;
    gap: 12px;
    padding: 14px 24px;
    justify-content: center;
    z-index: 200;
  }

  .bottom-bar button {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    padding: 8px 22px;
    border-radius: 8px;
    cursor: pointer;
    border: none;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .btn-print {
    background: var(--accent);
    color: white;
  }

  .btn-print:hover { background: var(--accent-hover); }

  .btn-reset {
    background: rgba(255,255,255,0.1);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.2) !important;
  }

  .btn-reset:hover { background: rgba(255,255,255,0.2); }

  /* ログインフォーム（ヘッダー外・全画面オーバーレイ） */
  #login-overlay {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  #login-form {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 8px 40px var(--shadow);
    text-align: center;
  }

  #login-form h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.2rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--ink);
    margin-bottom: 6px;
  }

  #login-form p {
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-bottom: 24px;
  }

  #login-form input {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: white;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  #login-form input:focus { border-color: var(--accent); }

  #login-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: background 0.2s;
    margin-top: 4px;
  }

  #login-btn:hover { background: var(--accent-hover); }

  #login-error {
    font-size: 0.78rem;
    color: #c55;
    margin-top: 10px;
    min-height: 18px;
  }

  /* ヘッダーのauth-bar（ログイン後） */
  .auth-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  #user-info {
    font-size: 0.8rem;
    color: var(--ink-faint);
    letter-spacing: 0.05em;
    flex: 1;
  }

  #logout-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem;
    padding: 6px 16px;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    background: rgba(255,255,255,0.15);
    color: var(--cream);
    border: 1px solid rgba(255,255,255,0.25);
    display: none;
  }

  #logout-btn:hover { background: rgba(255,255,255,0.25); }

  @media print {

    .bottom-bar,
    .btn-memo,
    .btn-delete-item,
    .add-item-form,
    .auth-bar {
      display: none !important;
    }

    .memo-area {
      display: block !important;
    }

    body {
      background: white;
    }

    /* PDF縦中央揃え解除 */
    .container {
      margin: 0 !important;
      padding: 16px !important;
    }

    .sections-grid {
      grid-template-columns: 1fr !important;
      align-items: start !important;
    }

    .section {
      break-inside: avoid;
      page-break-inside: avoid;
      box-shadow: none;
      border: 1px solid #ccc;
    }

    /* メモ欄の改行・文字切れ対策 */
    .memo-area textarea {
      display: block !important;
      height: auto !important;
      min-height: 0 !important;
      overflow: visible !important;
      white-space: pre-wrap !important;
      word-break: break-all !important;
    }
  }

  /* html2pdf用：PDF出力時にtextareaの内容を見えるようにする */
  .pdf-mode .memo-area {
    display: block !important;
  }
  .pdf-mode .memo-area textarea {
    white-space: pre-wrap !important;
    word-break: break-all !important;
    overflow: visible !important;
    height: auto !important;
    resize: none !important;
  }

  /* ===== PDF専用制御 ===== */
.pdf-mode .bottom-bar,
.pdf-mode .auth-bar,
.pdf-mode .add-item-form,
.pdf-mode .btn-memo,
.pdf-mode .btn-delete-item,
.pdf-mode .memo-area .btn-add-item,
.pdf-mode .memo-saved-message {
  display: none !important;
}

/* メモ欄の改ページ防止 */
.memo-area,
.memo-area div {
  break-inside: avoid;
  page-break-inside: avoid;
}

</style>
</head>
<body>

<!-- ログインオーバーレイ -->
<div id="login-overlay">
  <div id="login-form">
    <h2>真剣交際チェックリスト</h2>
    <p>ログインしてください</p>
    <input type="email" id="login-email" placeholder="メールアドレス" autocomplete="email">
    <input type="password" id="login-password" placeholder="パスワード" autocomplete="current-password">
    <button id="login-btn">ログイン</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- メインコンテンツ（ログイン後に表示） -->
<div id="main-content" style="display:none;">
  <header>
    <h1>真剣交際期間チェックリスト</h1>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 / 0 項目完了</div>
    <div class="auth-bar">
        <button id="logout-btn">ログアウト</button>
    </div>
  </header>

  <div class="container">
    <div class="sections-grid" id="sectionsGrid"></div>
  </div>
</div>

<div class="bottom-bar" style="display:none;">
  <button class="btn-print" onclick="savePDF()">📄 PDF保存</button>
  <button class="btn-reset" onclick="resetAll()">リセット</button>
</div>

<script>
function savePDF() {
  const ua = navigator.userAgent.toLowerCase();

  // アプリ内ブラウザ判定
  const isInApp = (
    ua.includes('line') ||
    ua.includes('fbav') ||
    ua.includes('instagram') ||
    ua.includes('twitter')
  );

  // 👉 ここ残す（重要）
  if (isInApp) {
    alert('PDF保存はブラウザで開いてからご利用ください。');
    return;
  }

  const btn = document.querySelector('.btn-print');

  // iOSヒント
  const isIOS = /iphone|ipad/i.test(ua);
  if (isIOS) {
    alert('共有ボタン → 「PDFを保存」を選択してください');
  }

  // ローディング演出
  btn.disabled = true;
  btn.textContent = 'PDF生成中...';

  document.body.classList.add('printing');

  setTimeout(() => {
    window.print();

    setTimeout(() => {
      document.body.classList.remove('printing');
      btn.disabled = false;
      btn.textContent = '📄 PDF保存';
    }, 1000);
  }, 100);
}

const SECTIONS = [
  {
    title: "自分",
    items: [
      { label: "自分の価値観や考え方について", sub: "生活習慣、価値観や趣味など（休日の過ごし方や、習い事）" },
      { label: "センシティブ情報について", sub: "宗教の信仰、持病、犯罪歴など" },
      { label: "自分の周りの人について", sub: "親族や親兄弟、身内の内の問題、人間関係など" },
    ]
  },
  {
    title: "結婚",
    items: [
      { label: "結婚や結婚準備について", sub: "結婚する・しない、婚約・結婚指輪有無" },
      { label: "結婚式について", sub: "結婚式する・しない、結婚の形式（挙式・教会・レストラン・海外など）" },
      { label: "新婚旅行について", sub: "旅行行く・行かない、時期、予算、行き先・日数など" },
    ]
  },
  {
    title: "仕事",
    items: [
      { label: "仕事について", sub: "今の仕事を続けたい、転職したい、自分・相手の希望の確認" },
      { label: "仕事内容・勤務時間等について", sub: "就業規則や勤務時間、残業時間、その他仕事内容について" },
    ]
  },
  {
    title: "子供",
    items: [
      { label: "子どもについて", sub: "できればほしい（時期や人数も）、特にこだわらない（夫婦ふたりで）" },
      { label: "自然妊娠や不妊治療についてなど", sub: "" },
      { label: "教育について", sub: "心身ともに健康な子、塾に関して大学まで行かせたい、公立・私立に通わせたいなど" },
    ]
  },
  {
    title: "経済・金銭",
    items: [
      { label: "収入について", sub: "収入金額について" },
      { label: "月々の生活費について", sub: "" },
      { label: "お金の使い方について", sub: "住居、食費、光熱費、お小遣い、貯蓄、趣味、スキルアップ、子供の教育費、親の援助など" },
      { label: "お財布管理", sub: "男性、女性、又は別々など" },
      { label: "資産状況や借入金について", sub: "ローン、貯金、有価証券、不動産など　借入金（奨学金等）、返済計画確認" },
    ]
  },
  {
    title: "家事・育児",
    items: [
      { label: "家事・育児分担", sub: "自分メイン、相手メイン、半々くらい" },
      { label: "出産後の働き方", sub: "出産後、仕事を続ける・続けないなど" },
    ]
  },
  {
    title: "新居",
    items: [
      { label: "居住希望地", sub: "場所や最寄駅など、希望理由など" },
      { label: "住宅形態や間取りについて", sub: "賃貸マンション・戸建て、マンション・戸建て購入" },
    ]
  },
  {
    title: "予定",
    items: [
      { label: "それぞれの親族への挨拶　○月ごろ", sub: "" },
      { label: "入籍時期　○月ごろ", sub: "" },
      { label: "入居時期　○月ごろ", sub: "" },
    ]
  },
  {
    title: "その他確認したい事",
    items: [
      { label: "決心・決意について（プロポーズ、承諾してもらった / プロポーズを受け、承諾した）", sub: "" },
    ],
    fullWidth: true
  }
];

const COLORS = ["#c4856a","#7a9e8e","#8a7db8","#c4a85a","#6a8fb8","#b87a9e","#7ab87a","#b8956a","#6ab8b8"];

let state = loadState();

function loadState() {
  try {
    const s = localStorage.getItem('shinken_checklist');
    if (s) return JSON.parse(s);
  } catch(e) {}
  const st = {};
  SECTIONS.forEach((sec, si) => {
    st[si] = { items: sec.items.map(it => ({ label: it.label, sub: it.sub || '', checked: false, memo: '' })) };
  });
  return st;
}

function saveState() {
  try { localStorage.setItem('shinken_checklist', JSON.stringify(state)); } catch(e) {}
  saveToFirestore();
}

function updateProgress() {
  let total = 0, done = 0;
  Object.values(state).forEach(sec => {
    sec.items.forEach(it => { total++; if (it.checked) done++; });
  });
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' 項目完了';
}

function renderAll() {
  const grid = document.getElementById('sectionsGrid');
  grid.innerHTML = '';
  SECTIONS.forEach((sec, si) => {
    if (!state[si]) {
      state[si] = { items: sec.items.map(it => ({ label: it.label, sub: it.sub || '', checked: false, memo: '' })) };
    }
    const secEl = document.createElement('div');
    secEl.className = 'section' + (sec.fullWidth ? ' full-width' : '');

    const items = state[si].items;
    const checkedCount = items.filter(i => i.checked).length;

    secEl.innerHTML = `
      <div class="section-header" onclick="toggleSection(${si}, this)">
        <div class="section-dot" style="background:${COLORS[si % COLORS.length]}"></div>
        <div class="section-title">${sec.title}</div>
        <div class="section-count">${checkedCount}/${items.length}</div>
        <div class="section-toggle">▾</div>
      </div>
      <div class="section-body" id="body-${si}">
        <div id="items-${si}"></div>
        <div class="add-item-form">
          <input type="text" id="new-item-${si}" placeholder="項目を追加…" onkeydown="if(event.key==='Enter')addItem(${si})">
          <button class="btn-add-item" onclick="addItem(${si})">＋</button>
        </div>
      </div>
    `;
    grid.appendChild(secEl);
    renderItems(si);
  });
  updateProgress();
}

function renderItems(si) {
  const container = document.getElementById('items-' + si);
  if (!container) return;
  container.innerHTML = '';
  state[si].items.forEach((item, ii) => {
    const el = document.createElement('div');
    el.className = 'item' + (item.checked ? ' checked' : '');
    el.id = `item-${si}-${ii}`;
    el.innerHTML = `
      <div class="item-top" onclick="toggleItem(${si},${ii})">
        <div class="item-checkbox"></div>
        <div class="item-text-wrap">
          <div class="item-label">${item.label}</div>
          ${item.sub ? `<div class="item-sub">${item.sub}</div>` : ''}
        </div>
        <div class="item-actions" onclick="event.stopPropagation()">
          <button class="btn-memo${item.memo ? ' active' : ''}" onclick="toggleMemo(${si},${ii})" id="btn-memo-${si}-${ii}">メモ</button>
          <button class="btn-delete-item" onclick="deleteItem(${si},${ii})">✕</button>
        </div>
      </div>
      <div class="memo-area${item.memo ? ' open' : ''}" id="memo-area-${si}-${ii}">
        <textarea placeholder="メモを入力…" onchange="saveMemo(${si},${ii},this.value)" oninput="autoResizeTextarea(this)">${item.memo || ''}</textarea>
        <button class="btn-add-item" style="margin-top:6px;float:right;" onclick="saveMemoToFirestore(${si},${ii})">保存</button>
        <span class="memo-saved-message" id="memo-saved-msg-${si}-${ii}" style="display:none;color:var(--accent);font-size:0.8em;margin-right:10px;float:left;">保存されました</span>
      </div>
    `;
    container.appendChild(el);
    // textareaの高さを初期化（内容に合わせて自動調整）
    const textarea = el.querySelector('textarea');
    if (textarea) autoResizeTextarea(textarea);
  });
}

function toggleItem(si, ii) {
  state[si].items[ii].checked = !state[si].items[ii].checked;
  saveState();
  const el = document.getElementById(`item-${si}-${ii}`);
  if (state[si].items[ii].checked) {
    el.classList.add('checked');
  } else {
    el.classList.remove('checked');
  }
  // update section count
  const items = state[si].items;
  const checkedCount = items.filter(i => i.checked).length;
  const countEl = document.querySelector(`#sectionsGrid .section:nth-child(${si+1}) .section-count`);
  if (countEl) countEl.textContent = checkedCount + '/' + items.length;
  updateProgress();
}

function toggleMemo(si, ii) {
  const area = document.getElementById(`memo-area-${si}-${ii}`);
  const btn = document.getElementById(`btn-memo-${si}-${ii}`);
  area.classList.toggle('open');
  btn.classList.toggle('active');
}

function saveMemo(si, ii, val) {
  state[si].items[ii].memo = val;
  saveState();
  const btn = document.getElementById(`btn-memo-${si}-${ii}`);
  if (btn) btn.classList.toggle('active', !!val);
}

function toggleSection(si, headerEl) {
  const body = document.getElementById('body-' + si);
  const toggle = headerEl.querySelector('.section-toggle');
  if (body.style.display === 'none') {
    body.style.display = '';
    toggle.style.transform = '';
  } else {
    body.style.display = 'none';
    toggle.style.transform = 'rotate(-90deg)';
  }
}

function addItem(si) {
  const input = document.getElementById('new-item-' + si);
  const label = input.value.trim();
  if (!label) return;
  state[si].items.push({ label, sub: '', checked: false, memo: '' });
  input.value = '';
  saveState();
  renderItems(si);
  // update count
  const items = state[si].items;
  const checkedCount = items.filter(i => i.checked).length;
  const secs = document.querySelectorAll('#sectionsGrid .section');
  const countEl = secs[si] ? secs[si].querySelector('.section-count') : null;
  if (countEl) countEl.textContent = checkedCount + '/' + items.length;
  updateProgress();
}

function deleteItem(si, ii) {
  if (!confirm('この項目を削除しますか？')) return;
  state[si].items.splice(ii, 1);
  saveState();
  renderItems(si);
  const items = state[si].items;
  const checkedCount = items.filter(i => i.checked).length;
  const secs = document.querySelectorAll('#sectionsGrid .section');
  const countEl = secs[si] ? secs[si].querySelector('.section-count') : null;
  if (countEl) countEl.textContent = checkedCount + '/' + items.length;
  updateProgress();
}

function resetAll() {
  if (!confirm('すべてのチェックとメモをリセットしますか？')) return;
  SECTIONS.forEach((sec, si) => {
    state[si] = { items: sec.items.map(it => ({ label: it.label, sub: it.sub || '', checked: false, memo: '' })) };
  });
  saveState();
  renderAll();
}

// --- textareaの高さを入力内容に合わせて自動調整する関数 ---
// コメント: メモ欄のtextareaが編集時に自動で高さ拡大されるようにする
function autoResizeTextarea(el) {
  el.style.height = 'auto'; // 一度リセット
  el.style.height = (el.scrollHeight) + 'px';
}


// --- sharedLists/list123 にstateを保存 ---
async function saveToFirestore() {
  const { doc, setDoc } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
  try {
    await setDoc(doc(window.db, 'sharedLists', 'list123'), { state: state }, { merge: true });
  } catch (e) {
    console.error('Firestore保存失敗:', e);
  }
}

// --- sharedLists/list123 からstateを読み込み ---
async function loadFromFirestore() {
  const { doc, getDoc, onSnapshot } = await import('https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js');
  const docRef = doc(window.db, 'sharedLists', 'list123');
  // リアルタイム同期
  onSnapshot(docRef, (snapshot) => {
    if (snapshot.exists()) {
      const data = snapshot.data();
      if (data.state) {
        // 各セクションのitemsをマージ（ラベル・subはSECTIONSのものを優先）
        SECTIONS.forEach((sec, si) => {
          const saved = data.state[si];
          if (saved && saved.items) {
            state[si] = {
              items: sec.items.map((it, ii) => {
                const s = saved.items[ii];
                return {
                  label: it.label,
                  sub: it.sub || '',
                  checked: s ? !!s.checked : false,
                  memo: s ? (s.memo || '') : ''
                };
              })
            };
            // 追加アイテム（カスタム追加分）
            if (saved.items.length > sec.items.length) {
              for (let ii = sec.items.length; ii < saved.items.length; ii++) {
                state[si].items.push(saved.items[ii]);
              }
            }
          }
        });
      }
    }
    renderAll();
  });
}

// メモ保存ボタン → Firestoreに保存
function saveMemoToFirestore(si, ii) {
  const textarea = document.getElementById(`memo-area-${si}-${ii}`).querySelector('textarea');
  state[si].items[ii].memo = textarea.value;
  saveState();
  saveToFirestore();
  const btn = document.getElementById(`btn-memo-${si}-${ii}`);
  if (btn) btn.classList.toggle('active', !!textarea.value);
  // 「保存されました」表示
  const msg = document.getElementById(`memo-saved-msg-${si}-${ii}`);
  if (msg) {
    msg.style.display = 'inline';
    setTimeout(() => { msg.style.display = 'none'; }, 1500);
  }
}

// 認証後にFirestoreからデータを読み込む
window.onAuthChanged = async (user) => {
  const overlay = document.getElementById('login-overlay');
  if (user) {
    overlay.style.display = 'none';
    await loadFromFirestore();
  } else {
    overlay.style.display = 'flex';
  }
};
</script>
